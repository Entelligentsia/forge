name: plugin-ci

# FORGE-S25-T01 — plugin test baseline + no-skip CI gate.
# FORGE-S25-T28 — Guardrails CI consolidation: manifest-drift, enum-catalog-drift,
#   schema-additionalProperties (via npm test), and skipped-test gates fully wired.

on:
  push:
    branches:
      - main
      - release
      - "**/release/**"
  pull_request:
    branches:
      - main

jobs:
  tests-and-skip-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # TODO(FORGE-S25-T28): re-add `npm ci` once devDependencies + lockfile land.
      # package.json currently declares no dependencies / devDependencies and
      # ships no package-lock.json, so an unconditional `npm ci` would fail.

      - name: No-skip / no-only gate
        run: node forge/tools/check-no-skipped-tests.cjs

      - name: Plugin test suite (tools + hooks)
        run: npm test

      - name: Manifest drift check
        # FORGE-S25-T28: --check mode exits 1 if structure-manifest.json or
        # enum-catalog.json/transitions/*.json are stale (build-manifest.cjs
        # also checks enum-catalog via the --check passthrough). Fix locally:
        # node forge/tools/build-manifest.cjs --forge-root forge/ then commit.
        run: node forge/tools/build-manifest.cjs --forge-root forge/ --check

      - name: Payload manifest drift check
        # FORGE-S32-T02: exits 1 if payload-manifest.json points at a missing
        # source or a file under a recursively-copied payload tree has no
        # covering manifest entry. Fix locally: update forge/payload-manifest.json
        # (and add new runtime-required tools to build-payload.cjs TOOLS_TO_COPY).
        run: node forge/tools/check-payload-manifest.cjs --forge-root forge/

      - name: Integrity verification
        run: node forge/tools/verify-integrity.cjs

  payload-require-gate:
    # FORGE-S32-T04 — payload-completeness require-walker, plugin side.
    # Auth-free (no ANTHROPIC_API_KEY): clones forge-cli at HEAD, builds the
    # payload from THIS in-tree plugin source (build-payload resolves
    # package.json forge.forgeRoot = ../forge/forge, i.e. the sibling checkout),
    # then runs the forge-cli walker against the freshly-built payload. Gates
    # every push/PR so a plugin change that drops a required sibling from the
    # bundle is caught red here — the MODULE_NOT_FOUND drift class
    # (FORGE-BUG-030 / FORGE-BUG-036) cannot ship. Kept as its own job (not
    # inside tmp-smoke) precisely so it needs no API key.
    name: payload-require-gate (forge-cli walker against in-tree payload)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout plugin (in-tree)
        uses: actions/checkout@v4
        with:
          path: forge

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone forge-cli at HEAD
        run: |
          set -e
          git clone --depth 1 --branch main https://github.com/Entelligentsia/forge-cli.git forge-cli-driver

      - name: Install forge-cli deps
        working-directory: forge-cli-driver
        run: npm ci

      - name: Build payload from in-tree plugin source
        # build-payload.cjs reads forge.forgeRoot (../forge/forge) relative to
        # the forge-cli-driver root, i.e. this workspace's checked-out plugin.
        working-directory: forge-cli-driver
        run: npm run build

      - name: Payload require gate
        working-directory: forge-cli-driver
        run: node tools/check-payload-requires.cjs dist/forge-payload

  tmp-smoke:
    # FORGE-S25-T03 — shared-surface contract. Clones forge-cli at main and
    # runs the tmp-smoke driver with FORGE_TMP_SMOKE_PLUGIN_SRC pointing at the
    # in-tree plugin source, so a plugin change cannot ship green without the
    # forge-cli driver also being green against it.
    name: tmp-smoke (forge-cli driver against in-tree plugin)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: tests-and-skip-gate

    steps:
      - name: Checkout plugin (in-tree)
        uses: actions/checkout@v4
        with:
          path: forge

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone forge-cli at HEAD
        run: |
          set -e
          git clone --depth 1 --branch main https://github.com/Entelligentsia/forge-cli.git forge-cli-driver

      - name: Install forge-cli deps
        working-directory: forge-cli-driver
        run: npm ci

      - name: Build forge-cli
        working-directory: forge-cli-driver
        run: npm run build

      - name: Run tmp-smoke against in-tree plugin source
        working-directory: forge-cli-driver
        env:
          FORGE_TMP_SMOKE_PLUGIN_SRC: ${{ github.workspace }}/forge/forge
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./test/e2e/tmp-smoke.sh

      - name: Assert phase-file glob compatibility (run-phases.ts contract)
        # FORGE-S31-T07: verify that phase-${n}-*.md files exist in the installed
        # payload for n=1..4. Defends the run-phases.ts filename contract against
        # plugin-side phase renames. Red on any phase-N file removal.
        working-directory: forge-cli-driver
        run: |
          set -e
          # The installed payload lives at the global-install prefix inside
          # .tmp-smoke-out. FORGE_TMP_SMOKE_PLUGIN_SRC rsync'd the in-tree plugin
          # source over the payload dir in place, so phases are at this path.
          PAYLOAD_DIR=".tmp-smoke-out/install-prefix/lib/node_modules/@entelligentsia/forgecli/dist/forge-payload"
          PHASES_DIR="$PAYLOAD_DIR/init/phases"
          MISSING=0
          for n in 1 2 3 4; do
            MATCH=$(find "$PHASES_DIR" -maxdepth 1 -name "phase-${n}-*.md" 2>/dev/null | wc -l)
            if [[ "$MATCH" -eq 0 ]]; then
              echo "FAIL: phase-${n}-*.md missing from $PHASES_DIR"
              MISSING=$((MISSING+1))
            else
              echo "PASS: phase-${n}-*.md present (count=$MATCH)"
            fi
          done
          exit $MISSING

      - name: Upload tmp-smoke SUMMARY artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tmp-smoke-summary-plugin-side
          path: |
            forge-cli-driver/.tmp-smoke-out/SUMMARY.md
            forge-cli-driver/.tmp-smoke-out/*.out
            forge-cli-driver/.tmp-smoke-out/*.log
          if-no-files-found: warn
          retention-days: 7
